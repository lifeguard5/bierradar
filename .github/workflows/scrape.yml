name: Bierradar Scraper

# Laeuft taeglich automatisch + bei jedem relevanten Push + manuell ausloesbar
on:
  schedule:
    # taeglich um 05:00 UTC (= 07:00 deutscher Sommerzeit)
    - cron: '0 5 * * *'
  workflow_dispatch:        # manuelles Starten ueber den Reiter "Actions"
  push:
    branches: [ main ]
    paths:
      - 'data/config.json'
      - 'data/biere.json'
      - 'scraper/**'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhaengigkeiten installieren
        run: pip install -r scraper/requirements.txt

      - name: Angebote auslesen (marktguru)
        run: python scraper/scrape.py

      - name: Aktualisierte Angebote committen
        run: |
          git config user.name  "bierradar-bot"
          git config user.email "bierradar-bot@users.noreply.github.com"
          git add data/angebote.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen an den Angeboten."
          else
            git commit -m "Angebote aktualisiert ($(date -u +%Y-%m-%d_%H:%M))"
            git push
          fi
