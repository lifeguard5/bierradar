<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00592d">
<meta name="description" content="Bierradar – sieh sofort, wo dein Lieblingsbier im Angebot ist.">
<title>Bierradar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- Kopfbereich -->
<header class="kopf">
  <div class="kopf-inhalt">
    <div class="logo">
      <svg class="logo-wappen" viewBox="0 0 40 48" aria-hidden="true">
        <path d="M20 2 L23 8 L20 6 L17 8 Z" fill="currentColor"/>
        <circle cx="20" cy="13" r="3.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <path d="M11 13 Q11 9 14.5 9 M29 13 Q29 9 25.5 9" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <path d="M9 18 L31 18 L28 40 Q20 46 12 40 Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M14 24 Q20 28 26 24" fill="none" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <div class="logo-text">
        <span class="logo-haupt">BIERRADAR</span>
        <span class="logo-unter">Angebote im Blick</span>
      </div>
    </div>
  </div>
  <div class="kopf-welle"></div>
</header>

<main class="inhalt">

  <!-- Status / Stand der Daten -->
  <div id="standzeile" class="standzeile" aria-live="polite">
    Lade Angebote&hellip;
  </div>

  <!-- Bier-Filter -->
  <section class="filter" aria-label="Biersorte filtern">
    <div id="filterleiste" class="filterleiste"></div>
    <div id="gebindeleiste" class="filterleiste gebindeleiste"></div>
  </section>

  <!-- Ergebnisliste -->
  <section id="ergebnisliste" class="ergebnisliste" aria-live="polite"></section>

  <!-- Info (ausklappbar) -->
  <details class="marktstatus">
    <summary>Über den Bierradar</summary>
    <div id="info-inhalt" class="marktstatus-inhalt"></div>
  </details>

</main>

<footer class="fuss">
  <p>Bierradar &middot; privates Projekt für Freunde</p>
  <p class="fuss-klein">
    Keine offizielle Seite einer Brauerei oder eines Marktes.
    Angaben ohne Gewähr – maßgeblich ist immer der Aushang im Markt.
  </p>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
